services:
  db:
    image: postgres:16-alpine
    container_name: farm_manager_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - farm_db_data:/var/lib/postgresql/data

volumes:
  farm_db_data:
